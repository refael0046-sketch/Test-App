<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>My Drawing Library</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <style>
    :root {
      --bg: #101010;
      --bg2: #171717;
      --card: #1e1e1e;
      --card2: #292929;
      --line: rgba(255, 255, 255, 0.09);
      --accent: #4a4a4a;
      --accent2: #6b6b6b;
      --text: #ececec;
      --muted: #9a9a9a;
      --danger: #d66;
      --safe-b: env(safe-area-inset-bottom);
      --safe-t: env(safe-area-inset-top);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(14px + var(--safe-t)) 16px 12px;
      background: rgba(16, 16, 16, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .title-row { display: flex; align-items: center; gap: 10px; }
    h1 { font-size: 20px; margin: 0; flex: 1; }
    h1 .brush { font-size: 22px; }

    .usage { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .search {
      margin-top: 12px;
      width: 100%;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 14px;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus { outline: 2px solid var(--accent2); }

    main { padding: 16px 16px 120px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    .card:active { transform: scale(0.97); }

    .thumb {
      aspect-ratio: 1 / 1;
      width: 100%;
      background: var(--card2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .filetype {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .filetype .ico { font-size: 40px; filter: grayscale(1); }
    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text);
      background: var(--accent);
      padding: 3px 9px;
      border-radius: 999px;
    }

    .meta { padding: 9px 11px 11px; }
    .name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .empty { text-align: center; color: var(--muted); padding: 60px 24px; }
    .empty .big { font-size: 60px; filter: grayscale(1); }
    .empty h2 { color: var(--text); margin: 12px 0 6px; font-size: 18px; }

    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(18px + var(--safe-b));
      z-index: 30;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 32px;
      line-height: 1;
      background: var(--accent);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .fab:active { transform: scale(0.9); }

    /* Full-screen sheets (detail + exporter) */
    .sheet {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: var(--bg);
      display: none;
      flex-direction: column;
      padding: calc(12px + var(--safe-t)) 14px calc(14px + var(--safe-b));
    }
    .sheet.open { display: flex; }

    .sheet-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sheet-top .s-title { flex: 1; font-weight: 600; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .icon-btn {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
    }
    .icon-btn:active { transform: scale(0.92); }

    .preview-wrap {
      flex: 1;
      min-height: 0;
      background: var(--card);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .preview-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .no-preview { text-align: center; color: var(--muted); padding: 24px; }
    .no-preview .ico { font-size: 64px; filter: grayscale(1); }
    .no-preview p { max-width: 280px; margin: 12px auto 0; font-size: 14px; line-height: 1.5; }

    .note-input {
      width: 100%;
      font: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      resize: none;
      margin-bottom: 10px;
    }
    .note-input:focus { outline: 2px solid var(--accent2); }

    .detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .actions { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      font: inherit;
      font-weight: 600;
      font-size: 15px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      cursor: pointer;
      background: var(--card2);
      color: var(--text);
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--text); color: #141414; border-color: var(--text); }
    .btn-delete { background: transparent; color: var(--danger); border-color: rgba(221,102,102,0.4); }

    /* Exporter */
    #exportCanvas {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      touch-action: none;
    }
    .ctrls { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .row label { font-size: 13px; color: var(--muted); width: 74px; flex-shrink: 0; }
    .seg { display: flex; gap: 6px; flex: 1; }
    .seg button {
      flex: 1; font: inherit; font-size: 13px; font-weight: 600;
      padding: 9px 0; border-radius: 10px;
      border: 1px solid var(--line); background: var(--card); color: var(--muted);
      cursor: pointer;
    }
    .seg button.on { background: var(--text); color: #141414; border-color: var(--text); }
    .wm-text {
      flex: 1; font: inherit; font-size: 14px; color: var(--text);
      background: var(--card); border: 1px solid var(--line);
      border-radius: 10px; padding: 9px 11px;
    }
    .wm-text:focus { outline: 2px solid var(--accent2); }
    input[type="range"] { flex: 1; accent-color: var(--accent2); }
    .hintline { font-size: 12px; color: var(--muted); text-align: center; margin-top: 2px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(96px + var(--safe-b));
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #141414;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 20px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 60;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1><span class="brush">🖼️</span> My Drawing Library</h1>
    </div>
    <div class="usage" id="usage">Loading…</div>
    <input class="search" id="search" type="search" placeholder="Search by name or note…" />
  </header>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">
      <div class="big">🖼️</div>
      <h2>Your library is empty</h2>
      <p>Tap the + button to add drawings.<br />Photos, PNGs, and art files like<br /><b>.procreate</b>, <b>.clip</b>, and <b>.psd</b> all work.</p>
    </div>
  </main>

  <button class="fab" id="addBtn" title="Add drawing">＋</button>
  <input type="file" id="fileInput" multiple accept="*/*" />

  <!-- Detail sheet -->
  <div class="sheet" id="detail">
    <div class="sheet-top">
      <button class="icon-btn" id="closeDetail">←</button>
      <div class="s-title" id="dTitle">Drawing</div>
    </div>
    <div class="preview-wrap" id="previewWrap"></div>
    <textarea class="note-input" id="noteInput" rows="2" placeholder="Add a note or tag…"></textarea>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="actions" id="detailActions"></div>
  </div>

  <!-- Export sheet -->
  <div class="sheet" id="exporter">
    <div class="sheet-top">
      <button class="icon-btn" id="closeExport">←</button>
      <div class="s-title">Export</div>
      <button class="icon-btn" id="doExport" style="width:auto;padding:0 16px;font-size:15px;font-weight:600;">Save</button>
    </div>
    <div class="preview-wrap">
      <canvas id="exportCanvas"></canvas>
    </div>
    <div class="hintline" id="dragHint">Type a watermark below, then drag it on the image.</div>
    <div class="ctrls">
      <div class="row">
        <label>Format</label>
        <div class="seg" id="fmtSeg">
          <button data-fmt="png" class="on">PNG</button>
          <button data-fmt="jpeg">JPG</button>
          <button data-fmt="webp">WebP</button>
        </div>
      </div>
      <div class="row">
        <label>Watermark</label>
        <input class="wm-text" id="wmText" type="text" placeholder="e.g. © your name (optional)" />
      </div>
      <div class="row">
        <label>Size</label>
        <input type="range" id="wmSize" min="2" max="20" value="6" />
      </div>
      <div class="row">
        <label>Opacity</label>
        <input type="range" id="wmOpacity" min="10" max="100" value="70" />
      </div>
      <div class="row">
        <label>Color</label>
        <div class="seg" id="wmColorSeg">
          <button data-color="#ffffff" class="on">White</button>
          <button data-color="#000000">Black</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ---------- IndexedDB ----------
    const DB_NAME = "drawing-library";
    const STORE = "items";
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const d = req.result;
          if (!d.objectStoreNames.contains(STORE))
            d.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    const store = (mode) => db.transaction(STORE, mode).objectStore(STORE);
    const req2p = (r) => new Promise((res, rej) => { r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
    const addItem = (i) => req2p(store("readwrite").add(i));
    const getAll = () => req2p(store("readonly").getAll());
    const getItem = (id) => req2p(store("readonly").get(id));
    const putItem = (i) => req2p(store("readwrite").put(i));
    const delItem = (id) => req2p(store("readwrite").delete(id));

    // ---------- Helpers ----------
    const PREVIEWABLE = ["png","jpg","jpeg","gif","webp","bmp","avif","svg"];
    const extOf = (name) => { const m = /\.([a-z0-9]+)$/i.exec(name || ""); return m ? m[1].toLowerCase() : ""; };
    const isPreviewable = (it) => (it.type && it.type.startsWith("image/")) || PREVIEWABLE.includes(it.ext);
    function fmtSize(b) {
      if (b < 1024) return b + " B";
      if (b < 1048576) return (b / 1024).toFixed(0) + " KB";
      if (b < 1073741824) return (b / 1048576).toFixed(1) + " MB";
      return (b / 1073741824).toFixed(2) + " GB";
    }
    function fmtDate(ts) {
      try { return new Date(ts).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); }
      catch { return ""; }
    }
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    function prettyApp(ext) {
      const map = { procreate:"Procreate", clip:"Clip Studio Paint", psd:"Photoshop", psb:"Photoshop",
        kra:"Krita", xcf:"GIMP", sai:"PaintTool SAI", sai2:"PaintTool SAI",
        afdesign:"Affinity Designer", afphoto:"Affinity Photo" };
      return map[ext] || "its app";
    }

    async function makeThumb(file) {
      try {
        const bmp = await createImageBitmap(file);
        const max = 400, scale = Math.min(1, max / Math.max(bmp.width, bmp.height));
        const w = Math.max(1, Math.round(bmp.width * scale)), h = Math.max(1, Math.round(bmp.height * scale));
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(bmp, 0, 0, w, h);
        bmp.close && bmp.close();
        return await new Promise((res) => c.toBlob(res, "image/jpeg", 0.82));
      } catch { return null; }
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    // ---------- UI state ----------
    const grid = document.getElementById("grid");
    const emptyEl = document.getElementById("empty");
    const searchEl = document.getElementById("search");
    const usageEl = document.getElementById("usage");
    const toastEl = document.getElementById("toast");
    let allItems = [];
    const urls = [];

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }
    const clearUrls = () => { while (urls.length) URL.revokeObjectURL(urls.pop()); };

    function render() {
      clearUrls();
      const q = searchEl.value.trim().toLowerCase();
      const items = allItems
        .filter(it => !q || it.name.toLowerCase().includes(q) || (it.note || "").toLowerCase().includes(q))
        .sort((a, b) => b.dateAdded - a.dateAdded);

      grid.innerHTML = "";
      emptyEl.style.display = items.length ? "none" : "block";

      for (const it of items) {
        const card = document.createElement("div");
        card.className = "card";
        card.addEventListener("click", () => openDetail(it.id));

        const thumb = document.createElement("div");
        thumb.className = "thumb";
        if (it.thumb) {
          const url = URL.createObjectURL(it.thumb); urls.push(url);
          const img = document.createElement("img");
          img.loading = "lazy"; img.src = url;
          thumb.appendChild(img);
        } else {
          const ft = document.createElement("div");
          ft.className = "filetype";
          ft.innerHTML = `<div class="ico">🎨</div><div class="badge">${escapeHtml(it.ext || "file")}</div>`;
          thumb.appendChild(ft);
        }

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `<div class="name">${escapeHtml(it.name)}</div>` +
          `<div class="sub">${fmtSize(it.size)} · ${fmtDate(it.dateAdded)}</div>`;

        card.appendChild(thumb); card.appendChild(meta);
        grid.appendChild(card);
      }
    }

    async function refresh() { allItems = await getAll(); render(); updateUsage(); }

    async function updateUsage() {
      const count = allItems.length;
      let extra = "";
      if (navigator.storage && navigator.storage.estimate) {
        try { const { usage } = await navigator.storage.estimate(); if (usage != null) extra = " · " + fmtSize(usage) + " used"; }
        catch {}
      }
      usageEl.textContent = `${count} drawing${count === 1 ? "" : "s"}${extra}`;
    }

    // ---------- Add files ----------
    const fileInput = document.getElementById("fileInput");
    document.getElementById("addBtn").addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      const files = Array.from(fileInput.files || []);
      fileInput.value = "";
      if (!files.length) return;
      let added = 0;
      for (const file of files) {
        try {
          const ext = extOf(file.name);
          const item = { name: file.name, type: file.type || "", ext, size: file.size,
            dateAdded: Date.now(), note: "", blob: file, thumb: null };
          if ((file.type && file.type.startsWith("image/")) || PREVIEWABLE.includes(ext))
            item.thumb = await makeThumb(file);
          await addItem(item); added++;
        } catch (e) { console.error(e); }
      }
      await refresh();
      toast(added === 1 ? "Added 1 drawing 🎉" : `Added ${added} drawings 🎉`);
    });

    // ---------- Detail sheet ----------
    const detail = document.getElementById("detail");
    const previewWrap = document.getElementById("previewWrap");
    const dTitle = document.getElementById("dTitle");
    const noteInput = document.getElementById("noteInput");
    const detailMeta = document.getElementById("detailMeta");
    const detailActions = document.getElementById("detailActions");
    let current = null, currentUrl = null;

    async function openDetail(id) {
      const it = await getItem(id);
      if (!it) return;
      current = it;
      dTitle.textContent = it.name;
      noteInput.value = it.note || "";
      detailMeta.textContent = `${(it.ext || "file").toUpperCase()} · ${fmtSize(it.size)} · added ${fmtDate(it.dateAdded)}`;

      if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
      previewWrap.innerHTML = "";
      detailActions.innerHTML = "";

      if (isPreviewable(it)) {
        currentUrl = URL.createObjectURL(it.blob);
        const img = document.createElement("img");
        img.src = currentUrl;
        previewWrap.appendChild(img);

        const exportBtn = document.createElement("button");
        exportBtn.className = "btn btn-primary";
        exportBtn.textContent = "⬇ Export / Watermark";
        exportBtn.addEventListener("click", () => openExporter(it));
        detailActions.appendChild(exportBtn);
      } else {
        const np = document.createElement("div");
        np.className = "no-preview";
        np.innerHTML = `<div class="ico">🎨</div><div class="badge">${escapeHtml(it.ext || "file")}</div>` +
          `<p>This is a ${prettyApp(it.ext)} file — its artwork is locked inside a proprietary format, so it can't be previewed or converted to PNG in a browser. It's stored safely; use <b>Export original</b> to open it in ${prettyApp(it.ext)}.<br><br>Tip: export a PNG/JPG from ${prettyApp(it.ext)} and add it here too — then you can re-export &amp; watermark it anytime.</p>`;
        previewWrap.appendChild(np);

        const origBtn = document.createElement("button");
        origBtn.className = "btn btn-primary";
        origBtn.textContent = "⬇ Export original";
        origBtn.addEventListener("click", () => { downloadBlob(current.blob, current.name); toast("Exporting…"); });
        detailActions.appendChild(origBtn);
      }

      const delBtn = document.createElement("button");
      delBtn.className = "btn btn-delete";
      delBtn.textContent = "🗑 Delete";
      delBtn.addEventListener("click", deleteCurrent);
      detailActions.appendChild(delBtn);

      detail.classList.add("open");
    }

    function closeDetail() {
      detail.classList.remove("open");
      if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
      current = null;
    }
    document.getElementById("closeDetail").addEventListener("click", closeDetail);

    noteInput.addEventListener("change", async () => {
      if (!current) return;
      current.note = noteInput.value;
      await putItem(current);
      const idx = allItems.findIndex(x => x.id === current.id);
      if (idx >= 0) allItems[idx].note = current.note;
      toast("Note saved");
    });

    async function deleteCurrent() {
      if (!current) return;
      if (!confirm(`Delete "${current.name}"? This can't be undone.`)) return;
      await delItem(current.id);
      closeDetail();
      await refresh();
      toast("Deleted");
    }

    // ---------- Exporter (format + movable watermark, at true resolution) ----------
    const exporter = document.getElementById("exporter");
    const canvas = document.getElementById("exportCanvas");
    const ctx = canvas.getContext("2d");
    const wmText = document.getElementById("wmText");
    const wmSize = document.getElementById("wmSize");
    const wmOpacity = document.getElementById("wmOpacity");
    let exportImg = null;         // loaded HTMLImageElement (full res)
    let exportItem = null;
    let exportUrl = null;
    let fmt = "png";
    let wmColor = "#ffffff";
    let wmPos = { x: 0.5, y: 0.9 }; // fractions of canvas

    function openExporter(it) {
      exportItem = it;
      if (exportUrl) URL.revokeObjectURL(exportUrl);
      exportUrl = URL.createObjectURL(it.blob);
      const img = new Image();
      img.onload = () => {
        exportImg = img;
        // Fit the preview canvas to the screen while keeping the image ratio.
        const wrap = canvas.parentElement.getBoundingClientRect();
        const maxW = wrap.width - 4, maxH = wrap.height - 4;
        const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
        canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
        canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
        wmPos = { x: 0.5, y: 0.9 };
        drawPreview();
      };
      img.onerror = () => toast("Couldn't load this image");
      img.src = exportUrl;
      exporter.classList.add("open");
    }

    function drawWatermark(c, cx, w, h) {
      const text = wmText.value.trim();
      if (!text) return;
      const fontPx = (Number(wmSize.value) / 100) * w;
      c.save();
      c.globalAlpha = Number(wmOpacity.value) / 100;
      c.fillStyle = wmColor;
      c.font = `bold ${fontPx}px -apple-system, "Segoe UI", Roboto, sans-serif`;
      c.textAlign = "center";
      c.textBaseline = "middle";
      c.shadowColor = wmColor === "#ffffff" ? "rgba(0,0,0,0.45)" : "rgba(255,255,255,0.45)";
      c.shadowBlur = fontPx * 0.12;
      c.fillText(text, wmPos.x * w, wmPos.y * h);
      c.restore();
    }

    function drawPreview() {
      if (!exportImg) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(exportImg, 0, 0, canvas.width, canvas.height);
      drawWatermark(ctx, ctx, canvas.width, canvas.height);
    }

    // Drag watermark on the preview
    function pointerMove(e) {
      const rect = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      wmPos.x = Math.min(1, Math.max(0, (p.clientX - rect.left) / rect.width));
      wmPos.y = Math.min(1, Math.max(0, (p.clientY - rect.top) / rect.height));
      drawPreview();
      e.preventDefault();
    }
    canvas.addEventListener("pointerdown", (e) => { pointerMove(e); canvas.setPointerCapture(e.pointerId); });
    canvas.addEventListener("pointermove", (e) => { if (e.buttons || e.pressure) pointerMove(e); });

    [wmText, wmSize, wmOpacity].forEach(el => el.addEventListener("input", drawPreview));

    document.getElementById("fmtSeg").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      fmt = b.dataset.fmt;
      [...e.currentTarget.children].forEach(x => x.classList.toggle("on", x === b));
    });
    document.getElementById("wmColorSeg").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      wmColor = b.dataset.color;
      [...e.currentTarget.children].forEach(x => x.classList.toggle("on", x === b));
      drawPreview();
    });

    document.getElementById("doExport").addEventListener("click", () => {
      if (!exportImg) return;
      // Render at the ORIGINAL, full resolution of the source image.
      const w = exportImg.naturalWidth, h = exportImg.naturalHeight;
      const off = document.createElement("canvas");
      off.width = w; off.height = h;
      const octx = off.getContext("2d");
      if (fmt === "jpeg") { octx.fillStyle = "#ffffff"; octx.fillRect(0, 0, w, h); } // JPG has no transparency
      octx.drawImage(exportImg, 0, 0, w, h);
      drawWatermark(octx, octx, w, h);

      const mime = fmt === "png" ? "image/png" : fmt === "jpeg" ? "image/jpeg" : "image/webp";
      const q = fmt === "png" ? undefined : 0.92;
      const base = (exportItem.name || "drawing").replace(/\.[^.]+$/, "");
      const outExt = fmt === "jpeg" ? "jpg" : fmt;
      off.toBlob((blob) => {
        if (!blob) { toast("Export failed on this browser"); return; }
        downloadBlob(blob, `${base}.${outExt}`);
        toast(`Exported ${w}×${h} ${outExt.toUpperCase()} ✓`);
      }, mime, q);
    });

    function closeExporter() {
      exporter.classList.remove("open");
      if (exportUrl) { URL.revokeObjectURL(exportUrl); exportUrl = null; }
      exportImg = null; exportItem = null;
    }
    document.getElementById("closeExport").addEventListener("click", closeExporter);

    searchEl.addEventListener("input", render);

    // ---------- Boot ----------
    (async () => {
      try {
        if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {});
        db = await openDB();
        await refresh();
      } catch (e) {
        usageEl.textContent = "Couldn't open storage on this browser 😕";
        console.error(e);
      }
    })();

    if ("serviceWorker" in navigator)
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  </script>
</body>
</html>
