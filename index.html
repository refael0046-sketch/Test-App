<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6d28d9" />
  <title>My Drawing Library</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <style>
    :root {
      --bg: #0f0c1d;
      --bg2: #1a1330;
      --card: #201a38;
      --card2: #2a2248;
      --accent: #8b5cf6;
      --accent2: #db2777;
      --text: #f3f0ff;
      --muted: #a89fc9;
      --danger: #f43f5e;
      --safe-b: env(safe-area-inset-bottom);
      --safe-t: env(safe-area-inset-top);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg));
      background-attachment: fixed;
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(14px + var(--safe-t)) 16px 12px;
      background: rgba(15, 12, 29, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .title-row { display: flex; align-items: center; gap: 10px; }
    h1 { font-size: 20px; margin: 0; flex: 1; }
    h1 .brush { font-size: 22px; }

    .usage { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .search {
      margin-top: 12px;
      width: 100%;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 11px 14px;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus { outline: 2px solid var(--accent); }

    main { padding: 16px 16px 120px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    .card:active { transform: scale(0.97); }

    .thumb {
      aspect-ratio: 1 / 1;
      width: 100%;
      background: var(--card2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .filetype {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .filetype .ico { font-size: 40px; }
    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 3px 9px;
      border-radius: 999px;
    }

    .meta { padding: 9px 11px 11px; }
    .name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 24px;
    }
    .empty .big { font-size: 60px; }
    .empty h2 { color: var(--text); margin: 12px 0 6px; font-size: 18px; }

    /* Floating add button */
    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(18px + var(--safe-b));
      z-index: 30;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: none;
      color: #fff;
      font-size: 32px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .fab:active { transform: scale(0.9); }

    /* Modal / detail view */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(8, 6, 16, 0.9);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      flex-direction: column;
      padding: calc(12px + var(--safe-t)) 14px calc(14px + var(--safe-b));
    }
    .modal.open { display: flex; }

    .modal-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .modal-top .m-title { flex: 1; font-weight: 600; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .icon-btn {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
    }
    .icon-btn:active { transform: scale(0.92); }

    .preview-wrap {
      flex: 1;
      min-height: 0;
      background: var(--card);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .preview-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .no-preview { text-align: center; color: var(--muted); padding: 24px; }
    .no-preview .ico { font-size: 64px; }
    .no-preview p { max-width: 260px; margin: 12px auto 0; font-size: 14px; line-height: 1.5; }

    .note-input {
      width: 100%;
      font: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      resize: none;
      margin-bottom: 10px;
    }
    .note-input:focus { outline: 2px solid var(--accent); }

    .detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .actions { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      font: inherit;
      font-weight: 600;
      font-size: 15px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.97); }
    .btn-export { background: #fff; color: #4c1d95; }
    .btn-delete { background: rgba(244, 63, 94, 0.15); color: var(--danger); border: 1px solid rgba(244,63,94,0.35); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(96px + var(--safe-b));
      transform: translateX(-50%) translateY(20px);
      background: #fff;
      color: #1a1330;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 20px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1><span class="brush">🎨</span> My Drawing Library</h1>
    </div>
    <div class="usage" id="usage">Loading…</div>
    <input class="search" id="search" type="search" placeholder="Search by name or note…" />
  </header>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">
      <div class="big">🖼️</div>
      <h2>Your library is empty</h2>
      <p>Tap the + button to add drawings.<br />Photos, PNGs, and art files like<br /><b>.procreate</b>, <b>.clip</b>, and <b>.psd</b> all work.</p>
    </div>
  </main>

  <button class="fab" id="addBtn" title="Add drawing">＋</button>
  <input type="file" id="fileInput" multiple accept="*/*" />

  <!-- Detail modal -->
  <div class="modal" id="modal">
    <div class="modal-top">
      <button class="icon-btn" id="closeBtn">←</button>
      <div class="m-title" id="mTitle">Drawing</div>
    </div>
    <div class="preview-wrap" id="previewWrap"></div>
    <textarea class="note-input" id="noteInput" rows="2" placeholder="Add a note or tag…"></textarea>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="actions">
      <button class="btn btn-export" id="exportBtn">⬇ Export</button>
      <button class="btn btn-delete" id="deleteBtn">🗑 Delete</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ---------- Tiny IndexedDB wrapper ----------
    const DB_NAME = "drawing-library";
    const STORE = "items";
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const d = req.result;
          if (!d.objectStoreNames.contains(STORE)) {
            d.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function tx(mode) { return db.transaction(STORE, mode).objectStore(STORE); }

    function addItem(item) {
      return new Promise((resolve, reject) => {
        const r = tx("readwrite").add(item);
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    }
    function getAll() {
      return new Promise((resolve, reject) => {
        const r = tx("readonly").getAll();
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    }
    function getItem(id) {
      return new Promise((resolve, reject) => {
        const r = tx("readonly").get(id);
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    }
    function putItem(item) {
      return new Promise((resolve, reject) => {
        const r = tx("readwrite").put(item);
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    }
    function delItem(id) {
      return new Promise((resolve, reject) => {
        const r = tx("readwrite").delete(id);
        r.onsuccess = () => resolve();
        r.onerror = () => reject(r.error);
      });
    }

    // ---------- Helpers ----------
    const PREVIEWABLE = ["png","jpg","jpeg","gif","webp","bmp","avif","svg"];

    function extOf(name) {
      const m = /\.([a-z0-9]+)$/i.exec(name || "");
      return m ? m[1].toLowerCase() : "";
    }
    function isPreviewable(item) {
      return (item.type && item.type.startsWith("image/")) || PREVIEWABLE.includes(item.ext);
    }
    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + " KB";
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + " MB";
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }
    function fmtDate(ts) {
      try { return new Date(ts).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); }
      catch { return ""; }
    }

    // Build a small thumbnail Blob for raster images (keeps the grid fast + light).
    async function makeThumb(file) {
      try {
        const bmp = await createImageBitmap(file);
        const max = 400;
        const scale = Math.min(1, max / Math.max(bmp.width, bmp.height));
        const w = Math.max(1, Math.round(bmp.width * scale));
        const h = Math.max(1, Math.round(bmp.height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(bmp, 0, 0, w, h);
        bmp.close && bmp.close();
        return await new Promise((res) => canvas.toBlob(res, "image/jpeg", 0.82));
      } catch { return null; }
    }

    // ---------- UI ----------
    const grid = document.getElementById("grid");
    const emptyEl = document.getElementById("empty");
    const searchEl = document.getElementById("search");
    const usageEl = document.getElementById("usage");
    const toastEl = document.getElementById("toast");

    let allItems = [];
    const urls = []; // object URLs to revoke on re-render

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    function clearUrls() { while (urls.length) URL.revokeObjectURL(urls.pop()); }

    function render() {
      clearUrls();
      const q = searchEl.value.trim().toLowerCase();
      const items = allItems
        .filter(it => !q || it.name.toLowerCase().includes(q) || (it.note || "").toLowerCase().includes(q))
        .sort((a, b) => b.dateAdded - a.dateAdded);

      grid.innerHTML = "";
      emptyEl.style.display = items.length ? "none" : "block";

      for (const it of items) {
        const card = document.createElement("div");
        card.className = "card";
        card.addEventListener("click", () => openDetail(it.id));

        const thumb = document.createElement("div");
        thumb.className = "thumb";

        if (it.thumb) {
          const url = URL.createObjectURL(it.thumb);
          urls.push(url);
          const img = document.createElement("img");
          img.loading = "lazy";
          img.src = url;
          thumb.appendChild(img);
        } else {
          const ft = document.createElement("div");
          ft.className = "filetype";
          ft.innerHTML = `<div class="ico">🎨</div><div class="badge">${(it.ext || "file")}</div>`;
          thumb.appendChild(ft);
        }

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML =
          `<div class="name">${escapeHtml(it.name)}</div>` +
          `<div class="sub">${fmtSize(it.size)} · ${fmtDate(it.dateAdded)}</div>`;

        card.appendChild(thumb);
        card.appendChild(meta);
        grid.appendChild(card);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    async function refresh() {
      allItems = await getAll();
      render();
      updateUsage();
    }

    async function updateUsage() {
      const count = allItems.length;
      let extra = "";
      if (navigator.storage && navigator.storage.estimate) {
        try {
          const { usage } = await navigator.storage.estimate();
          if (usage != null) extra = " · " + fmtSize(usage) + " used";
        } catch {}
      }
      usageEl.textContent = `${count} drawing${count === 1 ? "" : "s"}${extra}`;
    }

    // ---------- Add files ----------
    const fileInput = document.getElementById("fileInput");
    document.getElementById("addBtn").addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async () => {
      const files = Array.from(fileInput.files || []);
      fileInput.value = "";
      if (!files.length) return;

      let added = 0;
      for (const file of files) {
        try {
          const ext = extOf(file.name);
          const item = {
            name: file.name,
            type: file.type || "",
            ext,
            size: file.size,
            dateAdded: Date.now(),
            note: "",
            blob: file,
            thumb: null,
          };
          if ((file.type && file.type.startsWith("image/")) || PREVIEWABLE.includes(ext)) {
            item.thumb = await makeThumb(file);
          }
          await addItem(item);
          added++;
        } catch (e) {
          console.error(e);
        }
      }
      await refresh();
      toast(added === 1 ? "Added 1 drawing 🎉" : `Added ${added} drawings 🎉`);
    });

    // ---------- Detail modal ----------
    const modal = document.getElementById("modal");
    const previewWrap = document.getElementById("previewWrap");
    const mTitle = document.getElementById("mTitle");
    const noteInput = document.getElementById("noteInput");
    const detailMeta = document.getElementById("detailMeta");
    let current = null;
    let currentUrl = null;

    async function openDetail(id) {
      const it = await getItem(id);
      if (!it) return;
      current = it;
      mTitle.textContent = it.name;
      noteInput.value = it.note || "";
      detailMeta.textContent = `${(it.ext || "file").toUpperCase()} · ${fmtSize(it.size)} · added ${fmtDate(it.dateAdded)}`;

      if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
      previewWrap.innerHTML = "";
      if (isPreviewable(it)) {
        currentUrl = URL.createObjectURL(it.blob);
        const img = document.createElement("img");
        img.src = currentUrl;
        previewWrap.appendChild(img);
      } else {
        const np = document.createElement("div");
        np.className = "no-preview";
        np.innerHTML =
          `<div class="ico">🎨</div>` +
          `<div class="badge">${escapeHtml(it.ext || "file")}</div>` +
          `<p>This is an art-app file, so it can't be previewed in the browser — but it's stored safely. Use <b>Export</b> to open it in ${prettyApp(it.ext)}.</p>`;
        previewWrap.appendChild(np);
      }
      modal.classList.add("open");
    }

    function prettyApp(ext) {
      const map = {
        procreate: "Procreate", clip: "Clip Studio Paint", psd: "Photoshop",
        psb: "Photoshop", kra: "Krita", xcf: "GIMP", sai: "PaintTool SAI",
        sai2: "PaintTool SAI", afdesign: "Affinity Designer", afphoto: "Affinity Photo",
      };
      return map[ext] || "its app";
    }

    function closeModal() {
      modal.classList.remove("open");
      if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
      current = null;
    }
    document.getElementById("closeBtn").addEventListener("click", closeModal);

    // Save note on change
    noteInput.addEventListener("change", async () => {
      if (!current) return;
      current.note = noteInput.value;
      await putItem(current);
      const idx = allItems.findIndex(x => x.id === current.id);
      if (idx >= 0) allItems[idx].note = current.note;
      toast("Note saved");
    });

    // Export (download the original file back out)
    document.getElementById("exportBtn").addEventListener("click", () => {
      if (!current) return;
      const url = URL.createObjectURL(current.blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = current.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast("Exporting…");
    });

    // Delete
    document.getElementById("deleteBtn").addEventListener("click", async () => {
      if (!current) return;
      if (!confirm(`Delete "${current.name}"? This can't be undone.`)) return;
      await delItem(current.id);
      closeModal();
      await refresh();
      toast("Deleted");
    });

    searchEl.addEventListener("input", render);

    // Close modal with Android back button (history trick)
    window.addEventListener("popstate", () => { if (modal.classList.contains("open")) closeModal(); });

    // ---------- Boot ----------
    (async () => {
      try {
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persist().catch(() => {});
        }
        db = await openDB();
        await refresh();
      } catch (e) {
        usageEl.textContent = "Couldn't open storage on this browser 😕";
        console.error(e);
      }
    })();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
